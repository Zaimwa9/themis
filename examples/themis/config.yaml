# Themis per-repo config. Every key is optional; these are the defaults.
# Drop this directory into your repo root as `.themis/`.
# engine: codex            # codex | claude | glm | kimi | openrouter; unset = the instance's THEMIS_ENGINE
# web_access: false        # toggles engine web tooling; Claude Bash egress
                           # requires deployment-level controls (see docs/security.md)
model:
  # name: gpt-5.4          # unset = engine default (codex: gpt-5.4, claude: claude-opus-4-6[1m], glm: glm-5.2, kimi: kimi-k3, openrouter: openrouter/auto)
  reasoning_effort: high   # low | medium | high (codex only; claude-harness engines ignore it)
limits:
  timeout_seconds: 1200    # per agent attempt
  max_attempts: 2
  clone_depth: 50
triggers:
  auto_review: true        # false = review only when mentioned
learnings:
  enabled: true            # false = no capture, injection, or digest PRs
  digest_threshold: 10     # pending learnings that open/update the digest PR
agent:
  context: false           # true = native CLAUDE.md/AGENTS.md discovery, resolved
                           # from the PR base revision (never the PR head)
  skills: false            # true = native .claude/skills discovery, same rule
                           # (claude/glm/kimi/openrouter engines; codex has no skills surface)
review:
  modules:                 # always | auto | off (true = auto, false = off)
    scorecard: always      # canonical four-row numeric /5 table
    walkthrough: always    # collapsed logical-area details block
    product_impact: always # standalone product take
    big_picture: auto      # architecture/maintainability note, only with evidence
    verification_steps: always  # the "How to verify" block
    assumptions: always    # assumptions & unverified claims block
    sign_off: always       # PR-specific sign-off with reviewed-at SHA
    ci_context: auto       # CI commentary in the review body
    inline_findings: auto  # off = every finding folded into the summary
    code_suggestions: auto # off = fixes as prose, no ```suggestion blocks
