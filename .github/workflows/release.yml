name: release
on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      prs_created: ${{ steps.release.outputs.prs_created }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

  # The extra-files toml updater in release-please-config.json bumps uv.lock
  # inside the release PR itself, so version drift (#15) can no longer race a
  # fast merge. This job is a fallback only: if the updater's jsonpath stops
  # matching (e.g. a uv.lock schema change), it re-syncs the branch and
  # surfaces a warning instead of letting the release PR ship a stale lockfile.
  sync-lockfile:
    needs: release-please
    if: needs.release-please.outputs.prs_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}
      - uses: astral-sh/setup-uv@v5
      - name: Sync uv.lock with the release version bump
        run: |
          if ! uv lock --check; then
            echo "::warning::uv.lock was stale on the release PR; the extra-files toml updater in release-please-config.json did not bump it — check its jsonpath against the current uv.lock schema"
            uv lock
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "chore: sync uv.lock with release version bump"
            git push
          fi
      # The push above uses GITHUB_TOKEN, so it cannot trigger ci.yml on the
      # release PR either. Validate the branch's final state here instead.
      - name: Run CI checks on the synced branch
        run: |
          uv sync --locked
          uv run ruff check src tests
          uv run pytest -q

  # Tags created with GITHUB_TOKEN do not trigger other workflows, so the
  # image build chains off the release job instead of a tag push.
  image:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}
            type=raw,value=latest,enable=${{ !contains(needs.release-please.outputs.tag_name, '-') }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
